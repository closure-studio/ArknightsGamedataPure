name: Auto Deploy to Server
on:
  push:
    branches:
      - main  # 你的主要分支
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Send Deployment Start Notification
      run: |
        COMMIT_MSG=$(echo '${{ github.event.head_commit.message }}' | head -n 1 | sed 's/"/\\"/g' | sed "s/'/\\'/g")
        curl --request POST \
          --url ${{ secrets.QQBOT_URL }} \
          --header 'Content-Type: application/json' \
          --data "{
            \"token\": \"${{ secrets.QQBOT_TOKEN }}\",
            \"uid\": ${{ secrets.QQBOT_UID }},
            \"msg\": \"🚀 开始部署\\n分支: ${{ github.ref_name }}\\nCommit: ${GITHUB_SHA:0:7}\\n作者: ${{ github.actor }}\\n消息: ${COMMIT_MSG}\"
          }"
    
    - name: SSH and Deploy
      id: deploy
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USERNAME }}
        key: ${{ secrets.KEY }}
        port: ${{ secrets.SERVER_SSH_PORT }}
        script: |
          ${{ secrets.SERVER_DEPLOY_COMMAND }}
    
    - name: Send Deployment Success Notification
      if: success()
      run: |
        COMMIT_MSG=$(echo '${{ github.event.head_commit.message }}' | head -n 1 | sed 's/"/\\"/g' | sed "s/'/\\'/g")
        curl --request POST \
          --url ${{ secrets.QQBOT_URL }} \
          --header 'Content-Type: application/json' \
          --data "{
            \"token\": \"${{ secrets.QQBOT_TOKEN }}\",
            \"uid\": ${{ secrets.QQBOT_UID }},
            \"msg\": \"✅ 部署成功\\n分支: ${{ github.ref_name }}\\nCommit: ${GITHUB_SHA:0:7}\\n作者: ${{ github.actor }}\\n消息: ${COMMIT_MSG}\"
          }"
    
    - name: Send Deployment Failure Notification
      if: failure()
      run: |
        COMMIT_MSG=$(echo '${{ github.event.head_commit.message }}' | head -n 1 | sed 's/"/\\"/g' | sed "s/'/\\'/g")
        curl --request POST \
          --url ${{ secrets.QQBOT_URL }} \
          --header 'Content-Type: application/json' \
          --data "{
            \"token\": \"${{ secrets.QQBOT_TOKEN }}\",
            \"uid\": ${{ secrets.QQBOT_UID }},
            \"msg\": \"❌ 部署失败\\n分支: ${{ github.ref_name }}\\nCommit: ${GITHUB_SHA:0:7}\\n作者: ${{ github.actor }}\\n消息: ${COMMIT_MSG}\\n日志: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
          }"

  process-and-upload:
    runs-on: ubuntu-latest
    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Process game data
      run: node .github/scripts/process-data.js

    - name: Configure AWS credentials
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: auto
      run: |
        aws configure set aws_access_key_id $AWS_ACCESS_KEY_ID
        aws configure set aws_secret_access_key $AWS_SECRET_ACCESS_KEY
        aws configure set default.region auto

    - name: Upload to Cloudflare R2
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: auto
      run: |
        aws s3 cp processed/stage_table.json s3://${{ secrets.CLOUDFLARE_R2_BUCKET }}/stage_table.json --endpoint-url https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
        aws s3 cp processed/item_table.json s3://${{ secrets.CLOUDFLARE_R2_BUCKET }}/item_table.json --endpoint-url https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
        aws s3 cp processed/character_table.json s3://${{ secrets.CLOUDFLARE_R2_BUCKET }}/character_table.json --endpoint-url https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com

    - name: Send Upload Success Notification
      if: success()
      run: |
        COMMIT_MSG=$(echo '${{ github.event.head_commit.message }}' | head -n 1 | sed 's/"/\\"/g' | sed "s/'/\\'/g")
        curl --request POST \
          --url ${{ secrets.QQBOT_URL }} \
          --header 'Content-Type: application/json' \
          --data "{
            \"token\": \"${{ secrets.QQBOT_TOKEN }}\",
            \"uid\": ${{ secrets.QQBOT_UID }},
            \"msg\": \"✅ 数据处理并上传 R2 成功\\n分支: ${{ github.ref_name }}\\nCommit: ${GITHUB_SHA:0:7}\\n作者: ${{ github.actor }}\\n消息: ${COMMIT_MSG}\\n文件: stage_table.json, item_table.json, character_table.json\"
          }"

    - name: Send Upload Failure Notification
      if: failure()
      run: |
        COMMIT_MSG=$(echo '${{ github.event.head_commit.message }}' | head -n 1 | sed 's/"/\\"/g' | sed "s/'/\\'/g")
        curl --request POST \
          --url ${{ secrets.QQBOT_URL }} \
          --header 'Content-Type: application/json' \
          --data "{
            \"token\": \"${{ secrets.QQBOT_TOKEN }}\",
            \"uid\": ${{ secrets.QQBOT_UID }},
            \"msg\": \"❌ 数据处理或上传 R2 失败\\n分支: ${{ github.ref_name }}\\nCommit: ${GITHUB_SHA:0:7}\\n作者: ${{ github.actor }}\\n消息: ${COMMIT_MSG}\\n日志: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
          }"
